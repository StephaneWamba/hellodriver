name: Deploy API → Fly.io

on:
  push:
    branches: [main]
    paths:
      - 'apps/api/**'
      - 'packages/db/**'
      - 'packages/validators/**'
      - '.github/workflows/deploy-api.yml'

jobs:
  deploy:
    name: Deploy to Fly.io (jnb)
    runs-on: ubuntu-latest
    environment: production
    concurrency:
      group: deploy-api-production
      cancel-in-progress: false  # Never cancel in-flight deploys

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: '9.15.0'

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build dependencies
        run: |
          pnpm --filter @hellodriver/config build
          pnpm --filter @hellodriver/validators build
          pnpm --filter @hellodriver/db build

      - name: Run tests
        run: pnpm --filter @hellodriver/api test
        env:
          CI: 'true'
          NODE_ENV: test
          DATABASE_URL: 'postgresql://test:test@localhost:5432/test'
          REDIS_URL: 'redis://localhost:6379'
          SUPABASE_URL: 'https://placeholder.supabase.co'
          SUPABASE_ANON_KEY: 'placeholder'
          SUPABASE_SERVICE_KEY: 'placeholder'
          SUPABASE_JWT_SECRET: 'test-jwt-secret-32-chars-minimum!!'

      - uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Deploy
        run: flyctl deploy --remote-only --app hellodriver-api --config apps/api/fly.toml
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

  integration-tests:
    name: Integration Tests (Production)
    runs-on: ubuntu-latest
    needs: deploy
    environment: production
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: '9.15.0'

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build dependencies
        run: |
          pnpm --filter @hellodriver/config build
          pnpm --filter @hellodriver/validators build
          pnpm --filter @hellodriver/db build

      - name: Run integration tests against production
        run: cd apps/api && npm test -- --run payments.integration.test.ts
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          SUPABASE_JWT_SECRET: ${{ secrets.SUPABASE_JWT_SECRET }}
          REDIS_URL: ${{ secrets.REDIS_URL }}
          PAWAPAY_API_KEY: ${{ secrets.PAWAPAY_API_KEY }}
          PAWAPAY_BASE_URL: ${{ secrets.PAWAPAY_BASE_URL }}
