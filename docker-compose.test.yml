version: '3.8'

services:
  postgres:
    image: postgis/postgis:16-3.3
    container_name: hellodriver-postgres-test
    ports:
      - "5433:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: test
      POSTGRES_DB: test
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d test"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - hellodriver-test

  redis:
    image: redis:7-alpine
    container_name: hellodriver-redis-test
    ports:
      - "6379:6379"
    command: redis-server --maxmemory-policy noeviction
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - hellodriver-test

volumes:
  postgres_data:
  redis_data:

networks:
  hellodriver-test:
    driver: bridge
